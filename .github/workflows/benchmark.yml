# CI Benchmark Pipeline — Kruda Framework
# Tracks performance over time, alerts on regressions, publishes charts to GitHub Pages.
# Based on Fiber's benchmark model with benchmark-action/github-action-benchmark.

name: Benchmark

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
      - ".github/workflows/benchmark.yml"
      - "bench/**"
      - "scripts/**"
  pull_request:
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
      - ".github/workflows/benchmark.yml"
      - "bench/**"
      - "scripts/**"

permissions:
  deployments: write
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.10'

      - name: Install benchstat
        if: github.event_name == 'pull_request'
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run main benchmarks
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          git worktree add ../kruda-main origin/main

          cd ../kruda-main
          go test -tags kruda_stdjson -benchmem -count=3 -run=^$ -bench . ./... 2>&1 | tee "$GITHUB_WORKSPACE/main-output.txt"

          cd transport/wing
          go mod edit -replace=github.com/go-kruda/kruda=../..
          go mod tidy
          go test -benchmem -count=3 -run=^$ -bench . ./... 2>&1 | tee -a "$GITHUB_WORKSPACE/main-output.txt"

      - name: Run core benchmarks
        run: go test -tags kruda_stdjson -benchmem -count=3 -run=^$ -bench . ./... 2>&1 | tee output.txt

      - name: Run Wing alias module benchmarks
        # Same ephemeral local replace as the test workflow — wing alias module
        # requires kruda at the new tag, not yet on proxy during PR CI.
        # Restore go.mod/go.sum afterwards so later steps (e.g. switching to
        # gh-pages to publish results) don't see a dirty working tree.
        run: |
          cd transport/wing
          go mod edit -replace=github.com/go-kruda/kruda=../..
          go mod tidy
          go test -benchmem -count=3 -run=^$ -bench . ./... 2>&1 | tee -a "$GITHUB_WORKSPACE/output.txt"
          git checkout -- go.mod go.sum

      - name: Normalize benchmark output
        # github-action-benchmark treats larger ratios as worse. For Go
        # benchmark MB/s metrics, larger is better, so keep latency and
        # allocation metrics for regression gating.
        run: |
          sed -E 's/[[:space:]]+[0-9.]+ MB\/s//g' output.txt > benchmark.txt
          if [ -f main-output.txt ]; then
            sed -E 's/[[:space:]]+[0-9.]+ MB\/s//g' main-output.txt > main-benchmark.txt
          fi

      - name: Compare PR benchmarks with same-runner main
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail

          benchstat main-benchmark.txt benchmark.txt | tee benchstat.txt

          awk '
            /^[^[:space:]]/ && $0 ~ /\+[0-9.]+%/ && $0 !~ /~$/ {
              for (i = 1; i <= NF; i++) {
                if ($i ~ /^\+[0-9.]+%$/) {
                  change = $i
                  gsub(/^\+|%$/, "", change)
                  if ((change + 0) > 10) bad = 1
                }
              }
            }
            END {
              if (bad) {
                print "::error::Benchmark regression above 10% detected by same-runner benchstat."
                exit 1
              }
            }
          ' benchstat.txt

      - name: Get system information
        uses: kenchan0130/actions-system-info@v1.4.0
        id: system-info

      - name: Get main branch SHA
        id: get-main-sha
        run: |
          SHA=$(git rev-parse origin/main 2>/dev/null || echo "none")
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Restore benchmark cache from main
        id: cache
        if: steps.get-main-sha.outputs.sha != 'none'
        uses: actions/cache/restore@v5
        with:
          path: ./cache
          key: ${{ steps.get-main-sha.outputs.sha }}-${{ runner.os }}-${{ steps.system-info.outputs.cpu-model }}-benchmark

      - name: Seed benchmark baseline from GitHub Pages
        id: pages-baseline
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ./cache

          if ! git show origin/gh-pages:benchmarks/data.js > ./cache/data.js 2>/dev/null; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No published benchmark baseline found on gh-pages."
            exit 0
          fi

          node <<'NODE'
          const fs = require('fs');

          const source = fs.readFileSync('./cache/data.js', 'utf8').trim();
          const prefix = 'window.BENCHMARK_DATA =';
          if (!source.startsWith(prefix)) {
            throw new Error('Unexpected benchmark data format');
          }

          let json = source.slice(prefix.length).trim();
          if (json.endsWith(';')) {
            json = json.slice(0, -1).trim();
          }

          JSON.parse(json);
          fs.writeFileSync('./cache/benchmark-data.json', `${json}\n`);
          NODE

          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Compare PR results with published history
        uses: benchmark-action/github-action-benchmark@v1
        if: steps.cache.outputs.cache-hit == 'true' || steps.pages-baseline.outputs.available == 'true'
        with:
          tool: 'go'
          output-file-path: benchmark.txt
          external-data-json-path: ./cache/benchmark-data.json
          save-data-file: false
          fail-on-alert: false
          comment-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-always: true
          # Historical chart data is useful context, but noisy across runners.
          # The merge-blocking 10% gate is the same-runner benchstat step above.
          alert-threshold: "200%"

      - name: Store benchmark results for main
        uses: benchmark-action/github-action-benchmark@v1
        if: github.ref_name == 'main'
        with:
          tool: 'go'
          output-file-path: benchmark.txt
          external-data-json-path: ./cache/benchmark-data.json
          save-data-file: true
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          summary-always: true
          # Keep stored history informational; same-runner benchstat owns the
          # 10% regression gate for PRs.
          alert-threshold: "200%"

      - name: Publish to GitHub Pages
        uses: benchmark-action/github-action-benchmark@v1
        if: github.ref_name == 'main'
        with:
          tool: 'go'
          output-file-path: benchmark.txt
          benchmark-data-dir-path: "benchmarks"
          fail-on-alert: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on-alert: false
          summary-always: true
          save-data-file: true
          # Avoid noisy alert annotations/comments from historical chart
          # comparisons. Same-runner benchstat remains the strict gate.
          alert-threshold: "200%"
          auto-push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

      - name: Save benchmark cache
        uses: actions/cache/save@v5
        if: github.ref_name == 'main'
        with:
          path: ./cache
          key: ${{ steps.get-main-sha.outputs.sha }}-${{ runner.os }}-${{ steps.system-info.outputs.cpu-model }}-benchmark

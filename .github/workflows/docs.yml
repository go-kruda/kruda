# Documentation Deployment — Kruda Framework
# Builds VitePress docs and deploys to GitHub Pages
# Triggers on push to main when docs/ files are modified.

name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: docs

      - name: Build VitePress site
        run: npx vitepress build
        working-directory: docs

      - name: Copy benchmark data from gh-pages
        run: |
          git fetch origin gh-pages --depth=1 || true
          if git show origin/gh-pages:benchmarks/index.html > /dev/null 2>&1; then
            mkdir -p docs/.vitepress/dist/benchmarks
            git show origin/gh-pages:benchmarks/index.html > docs/.vitepress/dist/benchmarks/index.html
            git show origin/gh-pages:benchmarks/data.js > docs/.vitepress/dist/benchmarks/data.js
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# Release Workflow — Kruda Framework
# Triggers on version tags (v*), runs full test suite, creates GitHub release

name: Release

on:
  push:
    tags: ['v*']

permissions:
  actions: read
  contents: write
  packages: write

jobs:
  release-preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag was cut from green main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          TAG_SHA="$(git rev-parse "${TAG_NAME}^{commit}")"
          echo "Tag ${TAG_NAME} points to ${TAG_SHA}"

          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "::error::Release tags must point to a commit that is already on origin/main."
            exit 1
          fi

          require_green_workflow() {
            local workflow=$1
            local count
            count="$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow "$workflow" \
              --branch main \
              --commit "$TAG_SHA" \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq 'length')"
            if [ "$count" != "1" ]; then
              echo "::error::No successful ${workflow} run found on main for ${TAG_SHA}. Merge a PR, wait for green main checks, then tag."
              exit 1
            fi
          }

          require_green_workflow "test.yml"
          require_green_workflow "benchmark.yml"

  test:
    needs: release-preflight
    uses: ./.github/workflows/test.yml
    
  security:
    needs: release-preflight
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          
      - name: Run security scan (all modules)
        run: ./scripts/govulncheck-modules.sh
        
  release:
    name: Create Release
    needs: [release-preflight, test, security]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          
      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$(echo $VERSION | grep -qE '(alpha|beta|rc)' && echo true || echo false)" >> "$GITHUB_OUTPUT"
          
      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # Generate changelog
          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > CHANGELOG_CURRENT.md
            git log --oneline --no-merges ${PREV_TAG}..HEAD >> CHANGELOG_CURRENT.md
          else
            echo "## Initial Release" > CHANGELOG_CURRENT.md
            git log --oneline --no-merges >> CHANGELOG_CURRENT.md
          fi
          
          # Add benchmark info if available
          echo "" >> CHANGELOG_CURRENT.md
          echo "## Performance" >> CHANGELOG_CURRENT.md
          echo "Run benchmarks: \`go test -bench=. -benchmem -count=5 -tags kruda_stdjson ./bench/...\`" >> CHANGELOG_CURRENT.md
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG_CURRENT.md
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}
          files: |
            LICENSE
            README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

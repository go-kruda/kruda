# CI Test Pipeline — Kruda Framework
# Runs tests, vet, lint, and coverage on every push/PR
# Matrix: Go 1.25.11 + stable × {Linux, macOS, Windows}

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25.11', 'stable']
        os: [ubuntu-latest, macos-latest, windows-2025]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install revive
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25.11'
        run: |
          go install github.com/mgechev/revive@v1.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Check documentation
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25.11'
        run: |
          scripts/check-docs.sh
          scripts/check-godoc.sh

      - name: Go vet
        run: go vet -tags kruda_stdjson ./...

      - name: Lint (golangci-lint)
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25.11'
        uses: golangci/golangci-lint-action@v9
        with:
          args: --build-tags kruda_stdjson
          version: latest

      - name: Run tests
        shell: bash
        run: |
          COVER_FLAG=""
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            COVER_FLAG="-coverprofile=coverage.out"
          fi
          go test -v -race -tags kruda_stdjson $COVER_FLAG ./...

      - name: Run default JSON engine tests
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25.11'
        shell: bash
        run: CGO_ENABLED=1 go test -race ./...

      - name: Test contrib packages
        shell: bash
        # Dynamically discovers contrib modules so new modules cannot be missed
        # by a stale hardcoded CI list.
        run: scripts/test-standalone-modules.sh contrib

      - name: Test CLI
        run: scripts/test-standalone-modules.sh cmd/kruda

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == 'stable'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

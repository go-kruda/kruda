# CI Test Pipeline — Kruda Framework
# Runs tests, vet, lint, and coverage on every push/PR
# Matrix: Go 1.25 + stable × {Linux, macOS, Windows}

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25', 'stable']
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Go vet
        run: go vet -tags kruda_stdjson ./...

      - name: Lint (golangci-lint)
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25'
        uses: golangci/golangci-lint-action@v7
        with:
          args: --build-tags kruda_stdjson
          version: latest

      - name: Run tests
        shell: bash
        run: go test -v -race -tags kruda_stdjson -coverprofile=coverage.out ./...

      - name: Test Wing transport (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: cd transport/wing && go test -v -race ./...

      - name: Test contrib packages
        shell: bash
        run: |
          for dir in contrib/jwt contrib/ws contrib/ratelimit contrib/session contrib/compress contrib/etag contrib/cache contrib/otel contrib/prometheus contrib/swagger; do
            echo "::group::Testing $dir"
            cd $dir && go test -tags kruda_stdjson ./... && cd ${{ github.workspace }}
            echo "::endgroup::"
          done

      - name: Test CLI
        run: cd cmd/kruda && go test -tags kruda_stdjson ./...

      - name: Upload coverage to Codecov
        # Upload only once per Go version (Linux) to avoid duplicates
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

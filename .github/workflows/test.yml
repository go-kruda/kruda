# CI Test Pipeline — Kruda Framework
# Runs tests, vet, lint, and coverage on every push/PR
# Matrix: Go 1.25.10 + stable × {Linux, macOS, Windows}

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25.10', 'stable']
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Go vet
        run: go vet -tags kruda_stdjson ./...

      - name: Lint (golangci-lint)
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25.10'
        uses: golangci/golangci-lint-action@v9
        with:
          args: --build-tags kruda_stdjson
          version: latest

      - name: Run tests
        shell: bash
        run: |
          COVER_FLAG=""
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            COVER_FLAG="-coverprofile=coverage.out"
          fi
          go test -v -race -tags kruda_stdjson $COVER_FLAG ./...

      - name: Test Wing alias module (Linux/macOS)
        if: matrix.os != 'windows-latest'
        # Wing alias module's go.mod requires kruda at the new tag version, which
        # doesn't exist on the proxy until release. For PR CI we add a local
        # replace so tests can resolve kruda from the working tree. The replace
        # is ephemeral (CI runner only) — never committed.
        run: scripts/test-standalone-modules.sh --verbose --race transport/wing

      - name: Test contrib packages
        shell: bash
        # Dynamically discovers contrib modules so new modules cannot be missed
        # by a stale hardcoded CI list.
        run: scripts/test-standalone-modules.sh contrib

      - name: Test CLI
        run: scripts/test-standalone-modules.sh cmd/kruda

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == 'stable'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

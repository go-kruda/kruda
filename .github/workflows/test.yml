# CI Test Pipeline — Kruda Framework
# Runs tests, vet, lint, and coverage on every push/PR
# Matrix: Go 1.24 + stable × {Linux, macOS, Windows}

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.24', 'stable']
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Go vet
        run: go vet -tags kruda_stdjson ./...

      - name: Lint (golangci-lint)
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.24'
        uses: golangci/golangci-lint-action@v6
        with:
          args: --build-tags kruda_stdjson
          version: v2.1

      - name: Run tests
        shell: bash
        run: go test -v -race -tags kruda_stdjson -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        # Upload only once per Go version (Linux) to avoid duplicates
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
